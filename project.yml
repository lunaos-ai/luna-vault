# xcodegen config for the VibeVault.app target.
# Install xcodegen:  brew install xcodegen
# Generate Xcode project:  xcodegen generate
# Build .app:  xcodebuild -scheme VibeVault -configuration Release build

name: VibeVault
options:
  bundleIdPrefix: dev.vibevault
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: dev.vibevault
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  VaultCore:
    path: .

targets:
  VibeVault:
    type: application
    platform: macOS
    sources:
      - path: apps/VibeVaultApp
        excludes:
          - "Info.plist"
          - "VibeVault.entitlements"
          - "Resources"
    info:
      path: apps/VibeVaultApp/Info.plist
    entitlements:
      path: apps/VibeVaultApp/VibeVault.entitlements
    dependencies:
      - package: VaultCore
        product: VaultCore
    settings:
      base:
        INFOPLIST_FILE: apps/VibeVaultApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/VibeVaultApp/VibeVault.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

schemes:
  VibeVault:
    build:
      targets:
        VibeVault: all
    run:
      config: Debug
    archive:
      config: Release
