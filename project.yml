# xcodegen config for the LunaVault.app target.
# Install xcodegen:  brew install xcodegen
# Generate Xcode project:  xcodegen generate
# Build .app:  xcodebuild -scheme LunaVault -configuration Release build

name: LunaVault
options:
  bundleIdPrefix: dev.lunaos.vault
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: dev.lunaos.vault
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  VaultCore:
    path: .

targets:
  LunaVault:
    type: application
    platform: macOS
    sources:
      - path: apps/LunaVaultApp
        excludes:
          - "Info.plist"
          - "LunaVault.entitlements"
          - "Resources"
    info:
      path: apps/LunaVaultApp/Info.plist
    entitlements:
      path: apps/LunaVaultApp/LunaVault.entitlements
    dependencies:
      - package: VaultCore
        product: VaultCore
    settings:
      base:
        INFOPLIST_FILE: apps/LunaVaultApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/LunaVaultApp/LunaVault.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

schemes:
  LunaVault:
    build:
      targets:
        LunaVault: all
    run:
      config: Debug
    archive:
      config: Release
