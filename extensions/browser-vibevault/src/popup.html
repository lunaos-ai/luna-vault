<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vibe Vault</title>
    <style>
      body {
        width: 340px;
        margin: 0;
        background: #f8fafc;
        color: #101828;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        letter-spacing: 0;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 12px;
        color: #475467;
        line-height: 1.45;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 12px 0;
        padding: 10px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #ffffff;
      }

      .pill {
        padding: 3px 8px;
        border-radius: 999px;
        background: #f2f4f7;
        color: #344054;
        font-size: 12px;
        font-weight: 700;
      }

      .pill.ok {
        background: #ccfbf1;
        color: #115e59;
      }

      .pill.error {
        background: #ffe4e6;
        color: #9f1239;
      }

      code {
        display: block;
        overflow-wrap: anywhere;
        padding: 10px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #ffffff;
        color: #101828;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        min-height: 34px;
        margin-top: 10px;
        border: 0;
        border-radius: 6px;
        background: #101828;
        color: #ffffff;
        cursor: pointer;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vibe Vault</h1>
      <p>Use this command once after loading the unpacked extension.</p>
      <div class="status">
        <span>Native host</span>
        <span id="status" class="pill">Checking</span>
      </div>
      <code id="command"></code>
      <button id="copy" type="button">Copy command</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
