name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI release binaries
        run: |
          swift build -c release --product vibevault
          swift build -c release --product vibevault-mcp

      - name: GTM check
        run: bash scripts/gtm-check.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: bash scripts/gh-release.sh
