<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vibe Vault Logo</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .logo-container {
            text-align: center;
        }
        svg {
            width: 512px;
            height: 512px;
            box-shadow: 0 20px 60px rgba(79, 70, 229, 0.3);
            border-radius: 96px;
        }
        h1 {
            color: #fff;
            margin-top: 40px;
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        p {
            color: rgba(255,255,255,0.6);
            font-size: 20px;
            margin-top: 8px;
        }
        .sizes {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .size-item {
            text-align: center;
        }
        .size-item svg {
            width: var(--size);
            height: var(--size);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
        }
        .size-label {
            color: rgba(255,255,255,0.5);
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4F46E5"/>
                    <stop offset="100%" stop-color="#3730A3"/>
                </linearGradient>
                <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FFFFFF"/>
                    <stop offset="100%" stop-color="#E0E7FF"/>
                </linearGradient>
            </defs>
            <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#vaultGrad)"/>
            <rect x="56" y="56" width="400" height="400" rx="80" ry="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
            <g transform="translate(256, 256)">
                <circle cx="0" cy="-40" r="72" fill="none" stroke="url(#keyGrad)" stroke-width="24"/>
                <rect x="-12" y="20" width="24" height="120" rx="6" fill="url(#keyGrad)"/>
                <rect x="-12" y="100" width="48" height="20" rx="4" fill="url(#keyGrad)"/>
                <rect x="-12" y="130" width="36" height="18" rx="4" fill="url(#keyGrad)"/>
                <circle cx="0" cy="-40" r="20" fill="#4F46E5"/>
                <rect x="-8" y="-40" width="16" height="32" rx="4" fill="#4F46E5"/>
            </g>
            <circle cx="140" cy="140" r="12" fill="rgba(255,255,255,0.4)"/>
            <circle cx="372" cy="140" r="8" fill="rgba(255,255,255,0.3)"/>
            <circle cx="140" cy="372" r="8" fill="rgba(255,255,255,0.3)"/>
            <circle cx="372" cy="372" r="12" fill="rgba(255,255,255,0.4)"/>
        </svg>
        
        <h1>Vibe Vault</h1>
        <p>Secure secrets management for AI agents</p>
        
        <div class="sizes">
            <div class="size-item">
                <svg style="--size: 256px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#vaultGrad)"/>
                    <g transform="translate(256, 256)">
                        <circle cx="0" cy="-40" r="72" fill="none" stroke="url(#keyGrad)" stroke-width="24"/>
                        <rect x="-12" y="20" width="24" height="120" rx="6" fill="url(#keyGrad)"/>
                        <rect x="-12" y="100" width="48" height="20" rx="4" fill="url(#keyGrad)"/>
                        <rect x="-12" y="130" width="36" height="18" rx="4" fill="url(#keyGrad)"/>
                        <circle cx="0" cy="-40" r="20" fill="#4F46E5"/>
                        <rect x="-8" y="-40" width="16" height="32" rx="4" fill="#4F46E5"/>
                    </g>
                </svg>
                <div class="size-label">256px</div>
            </div>
            <div class="size-item">
                <svg style="--size: 128px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#vaultGrad)"/>
                    <g transform="translate(256, 256)">
                        <circle cx="0" cy="-40" r="72" fill="none" stroke="url(#keyGrad)" stroke-width="24"/>
                        <rect x="-12" y="20" width="24" height="120" rx="6" fill="url(#keyGrad)"/>
                        <rect x="-12" y="100" width="48" height="20" rx="4" fill="url(#keyGrad)"/>
                        <rect x="-12" y="130" width="36" height="18" rx="4" fill="url(#keyGrad)"/>
                        <circle cx="0" cy="-40" r="20" fill="#4F46E5"/>
                        <rect x="-8" y="-40" width="16" height="32" rx="4" fill="#4F46E5"/>
                    </g>
                </svg>
                <div class="size-label">128px</div>
            </div>
            <div class="size-item">
                <svg style="--size: 64px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#vaultGrad)"/>
                    <g transform="translate(256, 256)">
                        <circle cx="0" cy="-40" r="72" fill="none" stroke="url(#keyGrad)" stroke-width="24"/>
                        <rect x="-12" y="20" width="24" height="120" rx="6" fill="url(#keyGrad)"/>
                        <rect x="-12" y="100" width="48" height="20" rx="4" fill="url(#keyGrad)"/>
                        <rect x="-12" y="130" width="36" height="18" rx="4" fill="url(#keyGrad)"/>
                        <circle cx="0" cy="-40" r="20" fill="#4F46E5"/>
                        <rect x="-8" y="-40" width="16" height="32" rx="4" fill="#4F46E5"/>
                    </g>
                </svg>
                <div class="size-label">64px</div>
            </div>
            <div class="size-item">
                <svg style="--size: 32px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#vaultGrad)"/>
                    <g transform="translate(256, 256)">
                        <circle cx="0" cy="-40" r="72" fill="none" stroke="url(#keyGrad)" stroke-width="24"/>
                        <rect x="-12" y="20" width="24" height="120" rx="6" fill="url(#keyGrad)"/>
                        <rect x="-12" y="100" width="48" height="20" rx="4" fill="url(#keyGrad)"/>
                        <rect x="-12" y="130" width="36" height="18" rx="4" fill="url(#keyGrad)"/>
                        <circle cx="0" cy="-40" r="20" fill="#4F46E5"/>
                        <rect x="-8" y="-40" width="16" height="32" rx="4" fill="#4F46E5"/>
                    </g>
                </svg>
                <div class="size-label">32px</div>
            </div>
        </div>
    </div>
</body>
</html>
